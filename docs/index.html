<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sambung Kata - Pencarian Kata</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #2e7d32 0%, #66bb6a 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #2e7d32 0%, #66bb6a 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    .content {
      padding: 40px;
    }

    .search-box {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
    }

    .input-group label {
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      font-size: 1.05em;
    }

    .input-group input {
      padding: 12px 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1em;
      transition: border-color 0.3s;
    }

    .input-group input:focus {
      outline: none;
      border-color: #2e7d32;
      box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.15);
    }

    .search-group {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
    }

    .btn-search {
      flex: 1;
      padding: 12px 30px;
      background: linear-gradient(135deg, #2e7d32 0%, #66bb6a 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.05em;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-search:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(46, 125, 50, 0.3);
    }

    .btn-search:active {
      transform: translateY(0);
    }

    .sort-options {
      display: flex;
      gap: 20px;
      align-items: center;
      margin-bottom: 20px;
      padding: 15px;
      background: #f9f9f9;
      border-radius: 8px;
    }

    .sort-options label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-weight: 500;
      color: #333;
    }

    .sort-options input[type="radio"] {
      cursor: pointer;
      width: 16px;
      height: 16px;
    }

    .btn-clear {
      padding: 12px 30px;
      background: #f0f0f0;
      color: #333;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1.05em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-clear:hover {
      background: #e0e0e0;
      border-color: #999;
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #eee;
    }

    .results-header h2 {
      color: #333;
      font-size: 1.3em;
    }

    .count-badge {
      background: #2e7d32;
      color: white;
      padding: 8px 15px;
      border-radius: 25px;
      font-weight: 600;
      font-size: 0.95em;
    }

    .results-container {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      max-height: 500px;
      overflow-y: auto;
    }

    .word-item {
      background: #f5f5f5;
      padding: 12px 15px;
      border-radius: 8px;
      border-left: 4px solid #2e7d32;
      text-align: center;
      font-weight: 500;
      color: #333;
      transition: all 0.2s;
      cursor: pointer;
      user-select: none;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .word-item:hover {
      background: #2e7d32;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(46, 125, 50, 0.25);
    }

    .word-item.in-kbbi {
      border-left-color: #ff9800;
    }

    .kbbi-badge {
      background: #ff9800;
      color: white;
      font-size: 0.65em;
      padding: 3px 8px;
      border-radius: 3px;
      font-weight: 700;
      white-space: nowrap;
    }

    .sk-badge {
      background: #2196f3;
      color: white;
      font-size: 0.65em;
      padding: 3px 8px;
      border-radius: 3px;
      font-weight: 700;
      white-space: nowrap;
    }

    .no-results {
      text-align: center;
      padding: 40px;
      color: #999;
      font-size: 1.1em;
    }

    .info-message {
      background: #e8f5e9;
      border-left: 4px solid #2e7d32;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 25px;
      color: #1b5e20;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #2e7d32;
      font-weight: 500;
    }

    .status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 0.95em;
      color: #666;
    }

    @media (max-width: 600px) {
      .search-box {
        grid-template-columns: 1fr;
      }
      
      .search-group {
        flex-direction: column;
      }

      .header h1 {
        font-size: 1.8em;
      }
    }

    /* Scrollbar styling */
    .results-container::-webkit-scrollbar {
      width: 8px;
    }

    .results-container::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }

    .results-container::-webkit-scrollbar-thumb {
      background: #2e7d32;
      border-radius: 10px;
    }

    .results-container::-webkit-scrollbar-thumb:hover {
      background: #1b5e20;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>🔤 Sambung Kata</h1>
      <p>Cari kata berdasarkan awalan, tengah, dan akhiran</p>
    </div>

    <div class="content">
      <div class="info-message">
        💡 Masukkan awalan, huruf di tengah, akhiran, atau kombinasinya untuk mencari kata
      </div>

      <div class="info-message" style="background: #e3f2fd; border-left-color: #2196f3; color: #0d47a1;">
        📌 <strong>Keterangan Badge:</strong> <br style="display: inline-flex; gap: 15px; margin-left: 10px;">
          <br />
          <span><span class="sk-badge" style="display: inline-block;">SK</span> = Sambung Kata</span>
          <br />
          <span><span class="kbbi-badge" style="display: inline-block;">KBBI</span> = Kamus Besar Bahasa Indonesia</span>
        </span>
      </div>

      <div class="search-box">
        <div class="input-group">
          <label for="startLetter">Diawali Dengan</label>
          <input type="text" id="startLetter" placeholder="contoh: 'ab' atau 'a'">
        </div>
        <div class="input-group">
          <label for="middleLetter">Huruf di Tengah</label>
          <input type="text" id="middleLetter" placeholder="contoh: 'as' atau 'm'">
        </div>
        <div class="input-group">
          <label for="endLetter">Diakhiri Dengan</label>
          <input type="text" id="endLetter" placeholder="contoh: 'an' atau 'n'">
        </div>
      </div>

      <div class="search-group">
        <button class="btn-search" onclick="searchWords()">🔍 Cari</button>
        <button class="btn-clear" onclick="clearSearch()">Bersihkan</button>
      </div>

      <div class="sort-options">
        <label>
          <input type="radio" name="sortOrder" value="asc" checked onclick="updateSort()">
          📊 Paling Sedikit Huruf
        </label>
        <label>
          <input type="radio" name="sortOrder" value="desc" onclick="updateSort()">
          📊 Paling Banyak Huruf
        </label>
      </div>

      <div id="resultsSection" style="display: none;">
        <div class="results-header">
          <h2>Hasil</h2>
          <div class="count-badge">
            <span id="resultCount">0</span> kata
          </div>
        </div>
        <div id="resultsContainer" class="results-container"></div>
      </div>

      <div class="status">
        <span id="statusText">Siap!</span>
        <span id="totalCount"></span>
      </div>
    </div>
  </div>

  <!-- Load data directly -->
  <script src="data.js"></script>

  <script>
    // Data is already loaded from data.js as 'allWords'
    let currentResults = [];
    let sortOrder = 'asc'; // asc or desc
    
    // Initialize on page load
    window.addEventListener('load', () => {
      if (allWords && allWords.length > 0) {
        document.getElementById('statusText').textContent = '✓ Data berhasil dimuat';
        
        const kbbiCount = allWords.filter(item => typeof item === 'object' && item.kbbi === true).length;
        document.getElementById('totalCount').textContent = `Total: ${allWords.length} kata (${kbbiCount} di KBBI)`;
        
        document.getElementById('startLetter').focus();
      } else {
        document.getElementById('statusText').textContent = '✗ Galat: Data belum dimuat. Jalankan: node hm.js';
      }
    });

    // Allow Enter key to trigger search
    document.getElementById('startLetter').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchWords();
    });

    document.getElementById('endLetter').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchWords();
    });

    document.getElementById('middleLetter').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchWords();
    });

    // Auto-capitalize input
    document.getElementById('startLetter').addEventListener('input', (e) => {
      e.target.value = e.target.value.toLowerCase();
    });

    document.getElementById('endLetter').addEventListener('input', (e) => {
      e.target.value = e.target.value.toLowerCase();
    });

    document.getElementById('middleLetter').addEventListener('input', (e) => {
      e.target.value = e.target.value.toLowerCase();
    });

    function searchWords() {
      const startLetter = document.getElementById('startLetter').value.toLowerCase();
      const endLetter = document.getElementById('endLetter').value.toLowerCase();
      const middleLetter = document.getElementById('middleLetter').value.toLowerCase();

      if (!startLetter && !endLetter && !middleLetter) {
        alert('Masukkan awalan, huruf di tengah, atau akhiran terlebih dahulu');
        return;
      }

      // Filter words
      currentResults = allWords.filter(item => {
        const word = typeof item === 'string' ? item : item.word;
        const normalizedWord = word.toLowerCase();
        const matches = [];

        if (startLetter) {
          matches.push(normalizedWord.startsWith(startLetter));
        }

        if (endLetter) {
          matches.push(normalizedWord.endsWith(endLetter));
        }

        if (middleLetter) {
          const middleIndex = normalizedWord.indexOf(middleLetter);
          const isInMiddle =
            middleIndex > 0 &&
            middleIndex + middleLetter.length < normalizedWord.length;
          matches.push(isInMiddle);
        }

        return matches.every(m => m === true);
      });

      displayResults(currentResults);
    }

    function updateSort() {
      sortOrder = document.querySelector('input[name="sortOrder"]:checked').value;
      if (currentResults.length > 0) {
        displayResults(currentResults);
      }
    }

    function displayResults(words) {
      const resultsContainer = document.getElementById('resultsContainer');
      const resultsSection = document.getElementById('resultsSection');
      const resultCount = document.getElementById('resultCount');

      if (words.length === 0) {
        resultsContainer.innerHTML = '<div class="no-results">Tidak ada kata yang cocok</div>';
        resultCount.textContent = '0';
      } else {
        // Sort results: KBBI > SK > Others, then by length
        const sorted = [...words].sort((a, b) => {
          const wordA = typeof a === 'string' ? a : a.word;
          const wordB = typeof b === 'string' ? b : b.word;
          const isKbbiA = typeof a === 'object' && a.kbbi === true;
          const isKbbiB = typeof b === 'object' && b.kbbi === true;
          const isSkA = typeof a === 'object' && a.sk === true;
          const isSkB = typeof b === 'object' && b.sk === true;
          
          // Assign priority: KBBI=2, SK=1, Others=0
          const priorityA = isKbbiA ? 2 : (isSkA ? 1 : 0);
          const priorityB = isKbbiB ? 2 : (isSkB ? 1 : 0);
          
          // Sort by priority first (highest first)
          if (priorityA !== priorityB) {
            return priorityB - priorityA;
          }
          
          // Within same priority group, sort by length
          const lengthDiff = wordA.length - wordB.length;
          if (sortOrder === 'asc') {
            return lengthDiff;
          } else {
            return -lengthDiff;
          }
        });

        resultCount.textContent = words.length;
        resultsContainer.innerHTML = sorted
          .map(item => {
            const word = typeof item === 'string' ? item : item.word;
            const isInKbbi = typeof item === 'object' && item.kbbi === true;
            const isInSk = typeof item === 'object' && item.sk === true;
            const kbbiClass = isInKbbi ? 'in-kbbi' : '';
            const skBadgeHTML = isInSk ? '<span class="sk-badge" title="Sambung Kata">SK</span>' : '';
            const kbbiBadgeHTML = isInKbbi ? '<span class="kbbi-badge" title="Kamus Besar Bahasa Indonesia">KBBI</span>' : '';
            return `
                        <div class="word-item ${kbbiClass}" title="${word}" onclick="copyToClipboard('${word}')">
                            ${skBadgeHTML}
                            ${kbbiBadgeHTML}
                            <span>${word}</span>
                        </div>
                    `;
          })
          .join('');
      }

      resultsSection.style.display = 'block';
    }

    function clearSearch() {
      document.getElementById('startLetter').value = '';
      document.getElementById('endLetter').value = '';
      document.getElementById('middleLetter').value = '';
      document.getElementById('resultsSection').style.display = 'none';
      currentResults = [];
      document.getElementById('startLetter').focus();
    }

    // Copy word to clipboard
    function copyToClipboard(word) {
      navigator.clipboard.writeText(word).then(() => {
        alert(`Tersalin: ${word}`);
      });
    }
  </script>
</body>

</html>
